
# -----
# Build
prefix: '/proses' 
Timezone: Etc/UTC

collections:
  novels:
    output: true
    permalink: /:path/
  
permalink: pretty

defaults:
  - scope:
      path: "_novels/lp"
      type: novels
    values:
      layout: novel-lp
  - scope:
      path: "_novels/dp"
      type: novels
    values:
      layout: novel-dp



# ---
# Jekyll Config

plugins:
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE
  # Defining `exclude` overrides Jekyll's defaults, so re-exclude the gem
  # install dir. CI (ruby/setup-ruby) installs gems into vendor/bundle inside
  # the repo; without this Jekyll tries to build the gems' own templates.
  - vendor
  - .bundle

sass:
  sass_dir: .
  style: compressed
