
# -----
# Build
prefix: '/proses' 
Timezone: Etc/UTC

collections:
  novels:
    output: true
    permalink: /:path/
  
permalink: pretty

defaults:
  - scope:
      path: "_novels/lp"
      type: novels
    values:
      layout: novel-lp
  - scope:
      path: "_novels/dp"
      type: novels
    values:
      layout: novel-dp



# ---
# Jekyll Config

plugins:
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE

sass:
  sass_dir: .
  style: compressed
